<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Match next-themes before React paints (avoids light/dark flash + background pop-in) -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon_resnur.svg" />
    <link rel="apple-touch-icon" href="/favicon_resnur.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Resnur — AI Platform for Learning & Building</title>
    <meta name="description" content="Master AI & ML through daily concepts, visual slides, and community. Reason. Ease. Neural. Your all-in-one AI ecosystem." />
    <meta name="author" content="Resnur" />

    <meta property="og:title" content="Resnur — AI Platform for Learning & Building" />
    <meta property="og:description" content="Master AI & ML through daily concepts, visual slides, and community. Your all-in-one AI ecosystem." />
    <meta property="og:type" content="website" />

  </head>

</html>
